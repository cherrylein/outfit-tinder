name: Import outfit app

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  import-app:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Import outfit app'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prepared app zip
        run: |
          curl -L "https://oaisdmntprsouthcentralus.blob.core.windows.net/files/00000000-1a20-71f7-b436-e1f9c80b6c13/raw?se=2026-07-04T18%3A10%3A15Z&sp=r&sv=2026-02-06&sr=b&scid=19afa484-a84f-4a9c-bec0-80aef7afd85c&skoid=e9d2f8b1-028a-4cff-8eb1-d0e66fbefcca&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-04T12%3A58%3A45Z&ske=2026-07-06T12%3A58%3A45Z&sks=b&skv=2026-02-06&sig=UaYnLfJPvoMEI4HomJZhu9OwHH00AWxSKMBxJXZ2iBY%3D" -o /tmp/outfit-app.zip
          mkdir -p /tmp/outfit-app
          unzip -q /tmp/outfit-app.zip -d /tmp/outfit-app

      - name: Replace static app files
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            -exec rm -rf {} +
          cp -R /tmp/outfit-app/. .

      - name: Commit imported app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import optimized outfit tinder app"
            git push
          fi

      - name: Comment on trigger issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Import workflow finished.'
            })
